<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="haptic-widget">
        <div class="haptic-header">
            <div class="haptic-title-group">
                <span class="haptic-glitch-text">HAPTIC AI</span>
            </div>
            <div class="haptic-status-dot"></div>
        </div>

        <div class="haptic-glass-card">
            <span class="haptic-label">STOP THE SYSTEM</span>
            <label class="haptic-switch">
                <input type="checkbox" id="haptic-mute-toggle">
                <span class="haptic-slider"></span>
            </label>
        </div>

        <div class="haptic-actions">
            <button id="haptic-conn-btn" class="haptic-btn btn-blue">
                START THE SYSTEM
            </button>
            <button id="haptic-detect-btn" class="haptic-btn btn-cyan">
                ANALYZE THE FABRIC
            </button>
        </div>

        <div id="haptic-status-bar">
            <span id="haptic-status-text">SYSTEM READY...</span>
        </div>
    </div>

    <script>
        const connBtn = document.getElementById('haptic-conn-btn');
        const detectBtn = document.getElementById('haptic-detect-btn');
        const statusText = document.getElementById('haptic-status-text');

        connBtn.onclick = () => { statusText.innerText = "CONNECTING..."; statusText.style.color = "#007BFF"; };
        detectBtn.onclick = () => { statusText.innerText = "ANALYZING THE FABRIC..."; statusText.style.color = "#00FBFF"; };
    </script>
</body>
</html>
